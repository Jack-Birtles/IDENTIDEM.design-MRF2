name: Deploy Firmware Updater Site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install platformio==6.1.19

      - name: Run native unit tests
        run: pio test -d Firmware -e native_core_tests

  build:
    runs-on: ubuntu-latest
    needs: test
    env:
      PIO_ENV: adafruit_feather_esp32s3
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install PlatformIO
        run: pip install platformio==6.1.19

      - name: Build firmware
        run: pio run -d Firmware -e "$PIO_ENV"

      - name: Download previous firmware versions from last successful run
        id: prev-versions
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PREV_VERSIONS_DIR="prev-firmware-versions"
          mkdir -p "$PREV_VERSIONS_DIR"

          # Find the most recent successful run of this workflow (excluding current)
          PREV_RUN_ID=$(gh api \
            "repos/${{ github.repository }}/actions/workflows/firmware-updater-pages.yml/runs?status=success&per_page=5" \
            --jq "[.workflow_runs[] | select(.id != ${{ github.run_id }})][0].id // empty" 2>/dev/null || true)

          if [ -n "$PREV_RUN_ID" ]; then
            echo "Found previous successful run: $PREV_RUN_ID"

            # Download the github-pages artifact from that run
            ARTIFACT_URL=$(gh api \
              "repos/${{ github.repository }}/actions/runs/$PREV_RUN_ID/artifacts?name=github-pages" \
              --jq '.artifacts[0].archive_download_url // empty' 2>/dev/null || true)

            if [ -n "$ARTIFACT_URL" ]; then
              echo "Downloading previous Pages artifact..."
              ARCHIVE="$(mktemp)"
              gh api "$ARTIFACT_URL" > "$ARCHIVE" 2>/dev/null || true

              if [ -s "$ARCHIVE" ]; then
                EXTRACT_DIR="$(mktemp -d)"
                # GitHub wraps artifacts in a zip; inside is artifact.tar
                unzip -q -o "$ARCHIVE" -d "$EXTRACT_DIR" 2>/dev/null || true
                if [ -f "$EXTRACT_DIR/artifact.tar" ]; then
                  TAR_DIR="$(mktemp -d)"
                  tar xf "$EXTRACT_DIR/artifact.tar" -C "$TAR_DIR" 2>/dev/null || true
                  if [ -d "$TAR_DIR/firmware/versions" ]; then
                    cp -R "$TAR_DIR/firmware/versions/." "$PREV_VERSIONS_DIR/"
                    echo "Restored previous versions: $(ls "$PREV_VERSIONS_DIR" | tr '\n' ' ')"
                  fi
                  rm -rf "$TAR_DIR"
                fi
                rm -rf "$EXTRACT_DIR"
              fi
              rm -f "$ARCHIVE"
            else
              echo "No artifact found in previous run."
            fi
          else
            echo "No previous successful run found, building all versions from scratch."
          fi

          echo "dir=$PREV_VERSIONS_DIR" >> "$GITHUB_OUTPUT"

      - name: Prepare Pages site
        run: |
          set -euo pipefail

          BUILD_DIR="Firmware/.pio/build/$PIO_ENV"
          SITE_DIR="site"
          FIRMWARE_ROOT="$SITE_DIR/firmware"
          LATEST_DIR="$FIRMWARE_ROOT/latest"
          VERSIONS_DIR="$FIRMWARE_ROOT/versions"
          VERSION_INDEX_PATH="$FIRMWARE_ROOT/versions.json"
          FRAMEWORK_DIR="$HOME/.platformio/packages/framework-arduinoespressif32"
          VARIANT_DIR="$FRAMEWORK_DIR/variants/adafruit_feather_esp32s3"
          PREV_VERSIONS_DIR="${{ steps.prev-versions.outputs.dir }}"

          mkdir -p "$LATEST_DIR" "$VERSIONS_DIR"
          cp -R docs/. "$SITE_DIR/"
          cp Firmware/CHANGELOG.md "$SITE_DIR/changelog.md"
          BUILD_SHA_SHORT="${GITHUB_SHA:-local}"
          BUILD_SHA_SHORT="${BUILD_SHA_SHORT:0:7}"
          sed -i "s/__BUILD_SHA__/$BUILD_SHA_SHORT/g" "$SITE_DIR/index.html"

          BOOTLOADER_BIN="$VARIANT_DIR/bootloader-tinyuf2.bin"
          BOOT_APP0_BIN="$FRAMEWORK_DIR/tools/partitions/boot_app0.bin"
          TINYUF2_BIN="$VARIANT_DIR/tinyuf2.bin"

          for REQUIRED in "$BOOTLOADER_BIN" "$BOOT_APP0_BIN" "$TINYUF2_BIN"; do
            if [ ! -f "$REQUIRED" ]; then
              echo "Required firmware image not found: $REQUIRED"
              exit 1
            fi
          done

          extract_fw_version() {
            local firmware_dir="$1"
            local fw_line
            local fw_version
            fw_line=$(grep -E '^[[:space:]]*#define[[:space:]]+FWVERSION[[:space:]]+' "$firmware_dir/include/mrfconstants.h" | head -n 1 || true)
            fw_version=$(printf '%s\n' "$fw_line" | sed -nE 's/.*"([0-9]+(\.[0-9]+)*)".*/\1/p')
            if [ -z "$fw_version" ]; then
              fw_version="unknown"
            fi
            printf '%s\n' "$fw_version"
          }

          copy_build_outputs() {
            local build_dir="$1"
            local output_dir="$2"
            mkdir -p "$output_dir"

            for REQUIRED in "$build_dir/partitions.bin" "$build_dir/firmware.bin"; do
              if [ ! -f "$REQUIRED" ]; then
                echo "Required build artifact not found: $REQUIRED"
                return 1
              fi
            done

            cp "$BOOTLOADER_BIN" "$output_dir/bootloader.bin"
            cp "$build_dir/partitions.bin" "$output_dir/partitions.bin"
            cp "$BOOT_APP0_BIN" "$output_dir/boot_app0.bin"
            cp "$TINYUF2_BIN" "$output_dir/tinyuf2.bin"
            cp "$build_dir/firmware.bin" "$output_dir/firmware.bin"
          }

          write_manifest() {
            local output_dir="$1"
            local fw_version="$2"
            python3 -c 'import json,pathlib,sys; out_path=pathlib.Path(sys.argv[1]); fw_version=sys.argv[2]; payload={"name":"IDENTIDEM MRF2","version":fw_version,"new_install_prompt_erase":False,"new_install_improv_wait_time":0,"builds":[{"chipFamily":"ESP32-S3","parts":[{"path":"bootloader.bin","offset":0},{"path":"partitions.bin","offset":32768},{"path":"boot_app0.bin","offset":57344},{"path":"tinyuf2.bin","offset":2949120},{"path":"firmware.bin","offset":65536}]}]}; out_path.write_text(json.dumps(payload, indent=2)+"\n", encoding="utf-8")' "$output_dir/manifest.json" "$fw_version"
          }

          declare -A VERSION_SEEN=()
          VERSION_ROWS_FILE="$(mktemp)"
          WORKTREE_ROOT="$(mktemp -d)"

          cleanup() {
            set +e
            git worktree prune
            rm -rf "$WORKTREE_ROOT"
            rm -f "$VERSION_ROWS_FILE"
          }
          trap cleanup EXIT

          add_version_artifacts() {
            local fw_version="$1"
            local build_dir="$2"
            local source_tag="$3"
            local source_commit="${4:-}"

            if [ -z "$fw_version" ] || [ "$fw_version" = "unknown" ]; then
              echo "Skipping artifacts with unknown version from '$source_tag'"
              return 0
            fi

            if [ -n "${VERSION_SEEN[$fw_version]:-}" ]; then
              echo "Skipping duplicate firmware version '$fw_version' from '$source_tag'"
              return 0
            fi

            local version_dir="$VERSIONS_DIR/$fw_version"
            copy_build_outputs "$build_dir" "$version_dir"
            write_manifest "$version_dir" "$fw_version"
            VERSION_SEEN["$fw_version"]=1
            printf '%s|%s|%s|%s\n' "$fw_version" "./firmware/versions/$fw_version/manifest.json" "$source_tag" "$source_commit" >> "$VERSION_ROWS_FILE"
          }

          # 1. Publish the current (main) build as the "latest" channel
          CURRENT_FW_VERSION="$(extract_fw_version Firmware)"
          copy_build_outputs "$BUILD_DIR" "$LATEST_DIR"
          write_manifest "$LATEST_DIR" "$CURRENT_FW_VERSION"

          # 2. Restore or build tagged releases first, so a tagged build always
          #    owns its version slot. Previously main was registered first and
          #    an unbumped post-tag commit silently replaced the tagged binary
          #    under the same version string.
          mapfile -t RELEASE_TAGS < <(git tag -l --sort=-v:refname | grep -E '^v?[0-9]+(\.[0-9]+)*$' || true)

          for tag in "${RELEASE_TAGS[@]}"; do
            TAG_FW_VERSION="${tag#v}"

            # Skip if this version was already added by an earlier tag
            if [ -n "${VERSION_SEEN[$TAG_FW_VERSION]:-}" ]; then
              echo "Skipping tag '$tag': version '$TAG_FW_VERSION' already present."
              continue
            fi

            # Check if we have this version from a previous deployment
            if [ -d "$PREV_VERSIONS_DIR/$TAG_FW_VERSION" ] && [ -f "$PREV_VERSIONS_DIR/$TAG_FW_VERSION/manifest.json" ]; then
              echo "Reusing cached build for version '$TAG_FW_VERSION' from previous deployment."
              cp -R "$PREV_VERSIONS_DIR/$TAG_FW_VERSION" "$VERSIONS_DIR/$TAG_FW_VERSION"
              VERSION_SEEN["$TAG_FW_VERSION"]=1
              printf '%s|%s|%s|%s\n' "$TAG_FW_VERSION" "./firmware/versions/$TAG_FW_VERSION/manifest.json" "$tag" "" >> "$VERSION_ROWS_FILE"
              continue
            fi

            # Build from scratch — this tag's version is missing
            echo "Building version '$TAG_FW_VERSION' from tag '$tag' (not in cache)..."
            TAG_WORKTREE="$WORKTREE_ROOT/$tag"
            git worktree add --detach "$TAG_WORKTREE" "$tag"

            if pio run -d "$TAG_WORKTREE/Firmware" -e "$PIO_ENV"; then
              ACTUAL_FW_VERSION="$(extract_fw_version "$TAG_WORKTREE/Firmware")"
              add_version_artifacts "$ACTUAL_FW_VERSION" "$TAG_WORKTREE/Firmware/.pio/build/$PIO_ENV" "$tag"
            else
              echo "Skipping tag '$tag' because the build failed."
            fi

            git worktree remove --force "$TAG_WORKTREE"
          done

          # 3. Add main's build to the version list only if no tag published
          #    this version, i.e. it is a genuinely unreleased build.
          add_version_artifacts "$CURRENT_FW_VERSION" "$BUILD_DIR" "main" "$BUILD_SHA_SHORT"

          VERSION_ROWS_FILE="$VERSION_ROWS_FILE" VERSION_INDEX_PATH="$VERSION_INDEX_PATH" python3 - <<'PY'
          import json
          import os

          rows = []
          with open(os.environ["VERSION_ROWS_FILE"], "r", encoding="utf-8") as handle:
              for raw in handle:
                  line = raw.strip()
                  if not line:
                      continue
                  parts = line.split("|", 3)
                  while len(parts) < 4:
                      parts.append("")
                  rows.append(
                      {
                          "version": parts[0],
                          "manifest": parts[1],
                          "tag": parts[2],
                          "commit": parts[3],
                      }
                  )

          rows.sort(
              key=lambda item: [
                  (0, int(part)) if part.isdigit() else (1, part)
                  for part in item["version"].split(".")
              ],
              reverse=True,
          )
          latest_version = rows[0]["version"] if rows else ""
          payload = {"latest": latest_version, "versions": rows}
          with open(os.environ["VERSION_INDEX_PATH"], "w", encoding="utf-8") as out:
              out.write(json.dumps(payload, indent=2) + "\n")
          PY

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
