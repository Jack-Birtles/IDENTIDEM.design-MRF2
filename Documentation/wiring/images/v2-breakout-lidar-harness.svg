<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <title>v2 (MRF-Pro-v8) breakout to LiDAR harness — J7</title>
  <desc>Wiring diagram for the 6-pin JST-SH connector J7 on the MRF-Pro-v8 breakout, which the DTS6012M LiDAR plugs into 1:1. Pin 1 is the laser supply 3V3_LASER from the TLV75533 LDO U1 through FB1 and C1. Pin 2 is the logic supply 3V3_LIDAR from the LDO output. Pin 3 is the sensor UART TX to FPC pin 2 and Feather RX at main J1 pin 14. Pin 4 is the sensor UART RX to FPC pin 3 and Feather TX at main J1 pin 15. Pin 5 is INT tied to GND for UART mode. Pin 6 is GND. The LDO input is VBAT on FPC pin 1. The UART is wired 1:1 (pin to pin) through the FPC ribbon; there is no TX/RX crossover.</desc>

  <rect x="0" y="0" width="1000" height="620" fill="#ffffff"/>
  <text x="500" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#0f172a">v2 (MRF-Pro-v8) &#8212; breakout &#8594; LiDAR harness</text>
  <text x="500" y="53" text-anchor="middle" font-size="13" fill="#475569">Breakout connector J7 &#183; 6-pin JST-SH &#183; DTS6012M plugs in 1:1</text>

  <g font-size="12" fill="#334155">
    <line x1="150" y1="78" x2="184" y2="78" stroke="#d32f2f" stroke-width="3"/><text x="190" y="82">laser 3V3</text>
    <line x1="280" y1="78" x2="314" y2="78" stroke="#1565c0" stroke-width="3"/><text x="320" y="82">logic 3V3</text>
    <line x1="410" y1="78" x2="444" y2="78" stroke="#e58e26" stroke-width="3"/><text x="450" y="82">VBAT</text>
    <line x1="510" y1="78" x2="544" y2="78" stroke="#2e7d32" stroke-width="3"/><text x="550" y="82">UART</text>
    <line x1="610" y1="78" x2="644" y2="78" stroke="#111827" stroke-width="3"/><text x="650" y="82">GND</text>
  </g>

  <!-- ===================== J7 connector ===================== -->
  <rect x="70" y="150" width="210" height="300" rx="6" fill="#f1f5f9" stroke="#0f172a" stroke-width="2"/>
  <rect x="70" y="150" width="210" height="26" rx="6" fill="#0f172a"/>
  <text x="175" y="168" text-anchor="middle" font-size="12.5" font-weight="700" fill="#fff">J7 &#8592; DTS6012M</text>
  <polygon points="84,190 92,186 92,194" fill="#0f172a"/>
  <text x="98" y="193" font-size="9" fill="#64748b">pin 1</text>

  <g font-size="12" fill="#0f172a" font-weight="600">
    <text x="150" y="224" text-anchor="end">3V3_LASER</text>
    <text x="150" y="264" text-anchor="end">3V3_LIDAR</text>
    <text x="150" y="304" text-anchor="end">UART_TX</text>
    <text x="150" y="344" text-anchor="end">UART_RX</text>
    <text x="150" y="384" text-anchor="end">INT</text>
    <text x="150" y="424" text-anchor="end">GND</text>
  </g>
  <g font-size="9" fill="#64748b">
    <text x="150" y="236" text-anchor="end">laser</text>
    <text x="150" y="276" text-anchor="end">logic</text>
    <text x="150" y="316" text-anchor="end">sensor out</text>
    <text x="150" y="356" text-anchor="end">sensor in</text>
    <text x="150" y="396" text-anchor="end">&#8594; GND (mode)</text>
  </g>
  <g font-size="11" font-weight="700" fill="#fff">
    <rect x="252" y="210" width="20" height="20" rx="3" fill="#d32f2f"/><text x="262" y="225" text-anchor="middle">1</text>
    <rect x="252" y="250" width="20" height="20" rx="3" fill="#1565c0"/><text x="262" y="265" text-anchor="middle">2</text>
    <rect x="252" y="290" width="20" height="20" rx="3" fill="#2e7d32"/><text x="262" y="305" text-anchor="middle">3</text>
    <rect x="252" y="330" width="20" height="20" rx="3" fill="#2e7d32"/><text x="262" y="345" text-anchor="middle">4</text>
    <rect x="252" y="370" width="20" height="20" rx="3" fill="#64748b"/><text x="262" y="385" text-anchor="middle">5</text>
    <rect x="252" y="410" width="20" height="20" rx="3" fill="#111827"/><text x="262" y="425" text-anchor="middle">6</text>
  </g>

  <!-- ===================== LDO block ===================== -->
  <rect x="640" y="150" width="300" height="185" rx="8" fill="#fff" stroke="#0f172a" stroke-width="1.6"/>
  <text x="790" y="174" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0f172a">U1 &#183; TLV75533 LDO</text>
  <text x="790" y="191" text-anchor="middle" font-size="10.5" fill="#64748b">on the breakout (v2 only)</text>
  <!-- U1 core -->
  <rect x="762" y="230" width="56" height="40" rx="4" fill="#f1f5f9" stroke="#0f172a" stroke-width="1.4"/>
  <text x="790" y="254" text-anchor="middle" font-size="11" font-weight="700" fill="#0f172a">U1</text>
  <!-- VBAT in (right) -->
  <line x1="940" y1="250" x2="818" y2="250" stroke="#e58e26" stroke-width="2.6"/>
  <text x="864" y="242" text-anchor="middle" font-size="10" fill="#b46b0a">VBAT (FPC 1)</text>
  <circle cx="818" cy="250" r="3.5" fill="#e58e26"/>
  <!-- logic out terminal (to pin 2) -->
  <line x1="762" y1="242" x2="672" y2="242" stroke="#1565c0" stroke-width="2.6"/>
  <circle cx="672" cy="242" r="4" fill="#1565c0"/><text x="676" y="235" font-size="9.5" fill="#1565c0">3V3_LIDAR</text>
  <!-- laser out terminal (to pin 1) via FB1 + C1 -->
  <line x1="762" y1="258" x2="726" y2="258" stroke="#d32f2f" stroke-width="2.6"/>
  <rect x="690" y="250" width="34" height="16" rx="3" fill="#fff" stroke="#d32f2f" stroke-width="1.3"/><text x="707" y="262" text-anchor="middle" font-size="8.5" fill="#b91c1c">FB1</text>
  <line x1="690" y1="258" x2="672" y2="258" stroke="#d32f2f" stroke-width="2.6"/>
  <circle cx="672" cy="258" r="4" fill="#d32f2f"/><text x="676" y="282" font-size="9.5" fill="#b91c1c">3V3_LASER &#183; +C1 47&#181;F</text>

  <!-- wires J7 pin 1,2 -> LDO -->
  <polyline points="272,220 560,220 560,258 668,258" fill="none" stroke="#d32f2f" stroke-width="2.5"/>
  <polyline points="272,260 540,260 540,242 668,242" fill="none" stroke="#1565c0" stroke-width="2.5"/>

  <!-- ===================== FFC / Feather block ===================== -->
  <rect x="640" y="360" width="300" height="140" rx="8" fill="#fff" stroke="#0f172a" stroke-width="1.6"/>
  <text x="790" y="384" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0f172a">FPC ribbon &#8594; Feather</text>
  <text x="790" y="401" text-anchor="middle" font-size="10.5" fill="#64748b">breakout J5 &#8596; main J3 (8-pin, straight)</text>
  <circle cx="640" cy="430" r="4" fill="#2e7d32"/><text x="654" y="434" font-size="11" fill="#1b5e20"><tspan font-weight="700">UART_TX</tspan> &#183; pin 3 &#8594; FPC 2 &#8594; J1.14</text>
  <circle cx="640" cy="462" r="4" fill="#2e7d32"/><text x="654" y="466" font-size="11" fill="#1b5e20"><tspan font-weight="700">UART_RX</tspan> &#183; pin 4 &#8594; FPC 3 &#8594; J1.15</text>
  <text x="654" y="488" font-size="9.5" fill="#64748b">wired 1:1, pin to pin &#183; Serial2 @ 921600</text>

  <!-- wires J7 pin 3,4 -> FFC -->
  <polyline points="272,300 600,300 600,430 636,430" fill="none" stroke="#2e7d32" stroke-width="2.5"/>
  <polyline points="272,340 620,340 620,462 636,462" fill="none" stroke="#2e7d32" stroke-width="2.5"/>

  <!-- ===================== GND ===================== -->
  <polyline points="272,380 360,380" fill="none" stroke="#64748b" stroke-width="2.5"/>
  <polyline points="272,420 360,420" fill="none" stroke="#111827" stroke-width="2.5"/>
  <circle cx="360" cy="380" r="3.5" fill="#111827"/>
  <circle cx="360" cy="420" r="3.5" fill="#111827"/>
  <line x1="360" y1="380" x2="360" y2="512" stroke="#111827" stroke-width="2.5"/>
  <line x1="360" y1="512" x2="360" y2="524" stroke="#111827" stroke-width="2.5"/>
  <line x1="345" y1="524" x2="375" y2="524" stroke="#111827" stroke-width="2.5"/>
  <line x1="350" y1="530" x2="370" y2="530" stroke="#111827" stroke-width="2.5"/>
  <line x1="355" y1="536" x2="365" y2="536" stroke="#111827" stroke-width="2.5"/>
  <text x="384" y="528" font-size="11" fill="#334155">GND &#183; INT&#8594;GND (pin 5)</text>

  <!-- ===================== notes ===================== -->
  <line x1="70" y1="560" x2="940" y2="560" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="70" y="580" font-size="11" fill="#334155"><tspan font-weight="700">Straight-through:</tspan> the 6-pin LiDAR harness and the FPC are wired 1:1 (pin to pin) &#8212; no TX/RX crossover. Wire J7 to the DTS6012M pin for pin.</text>
  <text x="70" y="600" font-size="10.5" fill="#334155"><tspan font-weight="700">v2:</tspan> pins 1&#8211;2 are fed by the breakout LDO from VBAT, not the shared 3.3 V &#8212; this restores full range. Verify pin 1 vs the DTS6012M silk.</text>
</svg>
