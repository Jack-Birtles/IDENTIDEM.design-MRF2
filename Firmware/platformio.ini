; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:adafruit_feather_esp32s3]
platform = espressif32@6.5.0
board = adafruit_feather_esp32s3
framework = arduino
build_src_flags = 
	-Wall
	-Wextra
; Exact pins: CI rebuilds old tags from source when the Pages artifact cache
; expires, so floating ranges would silently change what builders flash.
lib_deps =
	adafruit/Adafruit SSD1306@2.5.17
	adafruit/Adafruit GFX Library@1.12.6
	olikraus/U8g2_for_Adafruit_GFX@1.8.0
	adafruit/Adafruit MAX1704X@1.0.3
	claws/BH1750@1.3.0
	thomasfredericks/Bounce2@2.72
	adafruit/Adafruit SH110X@2.1.14
	adafruit/Adafruit seesaw Library@1.7.9
	adafruit/Adafruit ADS1X15@2.6.2
	adafruit/Adafruit MPU6050@2.2.9
	adafruit/Adafruit BusIO@1.17.4
	adafruit/Adafruit Unified Sensor@1.1.15
	acornelissen/DTS6012M_UART@3.0.0

[env:native_core_tests]
platform = native
test_framework = unity
test_build_src = no
build_flags = 
	-Iinclude
	-Itest_stubs
lib_deps = acornelissen/DTS6012M_UART@3.0.0
